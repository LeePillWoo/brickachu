<!DOCTYPE html>
<html lang="en">

<head>

    <title>3D Nanoblock Game (Pikachu Edition)</title>
    <link rel="stylesheet" href="style.css?v=4">
    <!-- Import map for Three.js -->
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
          }
        }
    </script>
</head>

<body>


    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-W8GPB2QK" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div id="ui-layer">
        <button id="mobile-palette-toggle" class="mobile-only">🎨</button>
        <div id="preview-panel">
            <h3>3D Preview</h3>
            <div id="preview-container"></div>
            <div id="snap-controls">
                <div class="snap-row">
                    <button class="snap-btn" data-dir="iso-1" title="Iso 1">↘</button>
                    <button class="snap-btn" data-dir="iso-2" title="Iso 2">↙</button>
                    <button class="snap-btn" data-dir="iso-3" title="Iso 3">↖</button>
                    <button class="snap-btn" data-dir="iso-4" title="Iso 4">↗</button>
                </div>
                <div class="snap-row">
                    <button class="snap-btn cardinal" data-dir="top" title="Top">T</button>
                    <button class="snap-btn cardinal" data-dir="bottom" title="Bottom">Bo</button>
                    <button class="snap-btn cardinal" data-dir="front" title="Front">F</button>
                    <button class="snap-btn cardinal" data-dir="back" title="Back">Bk</button>
                    <button class="snap-btn cardinal" data-dir="left" title="Left">L</button>
                    <button class="snap-btn cardinal" data-dir="right" title="Right">R</button>
                </div>
            </div>
        </div>
        <div id="palette-panel">
            <h3>Colors (Right-click to edit)</h3>
            <!-- Generated dynamically -->
        </div>
        <div id="edit-mode-panel">
            <button class="mode-btn active" id="btn-add">✏️</button>
            <button class="mode-btn" id="btn-remove">⬜</button>
            <button class="mode-btn" id="btn-explode" title="Explode">💣</button>
            <button class="mode-btn" id="btn-restore" title="Restore"
                style="background-color: #2196F3; color: white;">↻</button>
            <button class="mode-btn" id="add-dog-btn" title="Spawn Animal"
                style="background-color: #ff9800; color: white;">🐾</button>
            <button class="mode-btn" id="btn-clear-animals" title="모든 동물 지우기"
                style="background-color: #e53935; color: white;">🧹</button>
            <button class="mode-btn" id="btn-game-speed" title="배속 (x1 → x2 → x3 → x1)">×1</button>
            <button id="btn-help">?</button>
        </div>
        <div id="countdown-overlay"></div>
        <div id="instructions" class="popup-style">
            <div id="instructions-header">
                <strong>Controls & Shortcuts</strong>
                <button id="btn-close-help">×</button>
            </div>
            <p><strong>Orbit:</strong> Right-drag / Alt + Left-drag</p>
            <p><strong>Build Path:</strong> Left-drag (Desktop)</p>
            <p><strong>Single Tap:</strong> Build on Grid/Block (Mobile)</p>
            <p><strong>Palette:</strong> Right-click to edit colors</p>
            <p><strong>Cancel:</strong> ESC key</p>
        </div>
    </div>

    <!-- Simplified Palette Popup -->
    <div id="palette-popup">
        <div class="popup-row">
            <label>Color</label>
            <input type="color" id="pop-color">
        </div>
        <div class="popup-row">
            <label>Roughness</label>
            <input type="range" id="pop-roughness" min="0" max="1" step="0.01">
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
